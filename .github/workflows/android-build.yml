name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  GRADLE_VERSION: '8.4'
  ANDROID_API_LEVEL: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  JAVA_VERSION: '17'

jobs:
  detect-project-type:
    runs-on: ubuntu-latest
    outputs:
      is_gradle: ${{ steps.detect.outputs.is_gradle }}
      is_cordova: ${{ steps.detect.outputs.is_cordova }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Detect project type
        id: detect
        run: |
          IS_GRADLE=false
          IS_CORDOVA=false
          
          if [ -f "build.gradle" ] || [ -f "build.gradle.kts" ] || [ -f "settings.gradle" ]; then
            IS_GRADLE=true
          fi
          
          if [ -f "cordova-app/config.xml" ] || [ -f "config.xml" ]; then
            IS_CORDOVA=true
          fi
          
          # Check if it's a web app that needs Cordova
          if [ -f "package.json" ] && [ -f "vite.config.ts" ] && [ "$IS_GRADLE" = false ]; then
            IS_CORDOVA=true
          fi
          
          echo "is_gradle=$IS_GRADLE" >> $GITHUB_OUTPUT
          echo "is_cordova=$IS_CORDOVA" >> $GITHUB_OUTPUT
          echo "Project type - Gradle: $IS_GRADLE, Cordova: $IS_CORDOVA"

  build-gradle:
    needs: detect-project-type
    if: needs.detect-project-type.outputs.is_gradle == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          build-tools-version: ${{ env.ANDROID_BUILD_TOOLS }}
          ndk-version: '26.1.10909125'

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew
        continue-on-error: true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace -x lint
        continue-on-error: true

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace -x lint
        continue-on-error: true

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore app.keystore -keyalg RSA -keysize 2048 -validity 10000 \
            -alias app-key -storepass android123 -keypass android123 \
            -dname "CN=AP Notes, O=APNotes, L=World, S=World, C=US"

      - name: Sign Release APK
        run: |
          find . -name "*release-unsigned.apk" -type f 2>/dev/null | while read apk; do
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore app.keystore -storepass android123 -keypass android123 \
              "$apk" app-key
            DIR=$(dirname "$apk")
            FILENAME=$(basename "$apk" -unsigned.apk)
            $ANDROID_SDK_ROOT/build-tools/${{ env.ANDROID_BUILD_TOOLS }}/zipalign -v 4 "$apk" "$DIR/${FILENAME}.apk"
          done

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk
          path: |
            **/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Publish Release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: '**/build/outputs/apk/**/*.apk'
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-cordova:
    needs: detect-project-type
    if: needs.detect-project-type.outputs.is_cordova == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          build-tools-version: ${{ env.ANDROID_BUILD_TOOLS }}
          ndk-version: '26.1.10909125'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        continue-on-error: true

      - name: Build web application
        run: npm run build 2>/dev/null || true
        env:
          VITE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CI: true

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Check/Create Cordova structure
        run: |
          if [ ! -f "cordova-app/config.xml" ]; then
            echo "Creating Cordova project structure..."
            cordova create cordova-app com.apnotes.ocr APNotesOCR
          fi

      - name: Add Android platform
        run: |
          cd cordova-app
          cordova platform add android@latest 2>/dev/null || true
          cordova platform update android 2>/dev/null || true

      - name: Copy built web app
        run: |
          if [ -d "dist" ] && [ -d "cordova-app/www" ]; then
            rm -rf cordova-app/www/*
            cp -r dist/* cordova-app/www/
            echo "Web app copied to Cordova"
          fi

      - name: Configure Android settings
        run: |
          if [ -f "cordova-app/config.xml" ]; then
            # Add Android preferences if not present
            if ! grep -q 'android-minSdkVersion' cordova-app/config.xml; then
              sed -i '/<platform name="android">/a\        <preference name="android-minSdkVersion" value="21" />\n        <preference name="android-targetSdkVersion" value="34" />\n        <preference name="android-compileSdkVersion" value="34" />' cordova-app/config.xml
            fi
          fi

      - name: Build Cordova APK (Release)
        id: build_release
        run: |
          cd cordova-app
          cordova build android --release 2>&1 | tee build.log
        continue-on-error: true

      - name: Build Cordova APK (Debug - Fallback)
        if: failure()
        id: build_debug
        run: |
          cd cordova-app
          cordova build android 2>&1 | tee build_debug.log

      - name: Generate signing key
        run: |
          keytool -genkey -v -keystore cordova-app/release.keystore -keyalg RSA -keysize 2048 \
            -validity 10000 -alias release -storepass android123 -keypass android123 \
            -dname "CN=AP Notes, O=APNotes, L=World, S=World, C=US"

      - name: Sign APK if exists
        run: |
          cd cordova-app
          UNSIGNED_APK=$(find . -name "*release-unsigned.apk" -type f 2>/dev/null | head -1)
          
          if [ ! -z "$UNSIGNED_APK" ]; then
            echo "Signing APK: $UNSIGNED_APK"
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore release.keystore -storepass android123 -keypass android123 \
              "$UNSIGNED_APK" release
            
            OUTPUT_APK="$(dirname $UNSIGNED_APK)/APNotesOCR.apk"
            $ANDROID_SDK_ROOT/build-tools/${{ env.ANDROID_BUILD_TOOLS }}/zipalign -v 4 "$UNSIGNED_APK" "$OUTPUT_APK"
            echo "Signed APK created: $OUTPUT_APK"
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cordova-apk
          path: |
            cordova-app/platforms/android/app/build/outputs/apk/**/*.apk
            cordova-app/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cordova-build-logs
          path: |
            cordova-app/build.log
            cordova-app/build_debug.log
          retention-days: 7

      - name: Publish Release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cordova-app/platforms/android/app/build/outputs/apk/**/*.apk
            cordova-app/*.apk
          draft: false

  notify:
    needs: [ build-gradle, build-cordova ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build status
        run: |
          echo "Build completed!"
          echo "Gradle build: ${{ needs.build-gradle.result }}"
          echo "Cordova build: ${{ needs.build-cordova.result }}"
