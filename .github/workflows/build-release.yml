name: Build Play Store AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Build web app
        run: npm run build

      # Java + Android
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ✅ Use YOUR secret name here
      - name: Decode Keystore
        run: |
          echo "${{ secrets.AP_NOTES_APK }}" | base64 --decode > keystore.jks

      # Create Android project dynamically
      - name: Create Android Project
        run: |
          mkdir android-app
          cd android-app

          gradle init --type basic

          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/example/app

          cp -r ../dist/* app/src/main/assets/

          cat > app/src/main/java/com/example/app/MainActivity.java <<EOF
          package com.example.app;

          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          EOF

          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml <<EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.app">

              <application
                  android:label="MyApp"
                  android:theme="@android:style/Theme.Light.NoTitleBar">

                  <activity android:name=".MainActivity">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

              </application>
          </manifest>
          EOF

          cat > app/build.gradle <<EOF
          plugins {
              id 'com.android.application'
          }

          android {
              compileSdk 34

              defaultConfig {
                  applicationId "com.example.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              signingConfigs {
                  release {
                      storeFile file("../../keystore.jks")
                      storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
                      keyAlias "${{ secrets.KEY_ALIAS }}"
                      keyPassword "${{ secrets.KEY_PASSWORD }}"
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }

          dependencies {}
          EOF

          echo "include ':app'" > settings.gradle

      - name: Build Release AAB
        run: |
          cd android-app
          gradle bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: playstore-aab
          path: android-app/app/build/outputs/bundle/release/*.aab