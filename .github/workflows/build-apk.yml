name: Build APK from Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      # Install Bubblewrap (TWA tool)
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      # Initialize TWA project (auto config)
      - name: Init TWA
        run: |
          bubblewrap init --manifest=https://your-site-url.com/manifest.json || true

      # Build APK
      - name: Build APK
        run: |
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ./**/*.apk