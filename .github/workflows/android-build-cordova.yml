name: Build Android APK (Cordova)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools-version: '34.0.0'
        ndk-version: '26.1.10909125'

    - name: Install dependencies
      run: npm ci

    - name: Build web app
      run: npm run build
      env:
        VITE_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova project
      run: |
        cordova create cordova-app com.apnotes.ocr APNotesOCR
        cd cordova-app
        cordova platform add android@latest
      continue-on-error: true

    - name: Copy built web app to Cordova
      run: |
        if [ -d "cordova-app" ]; then
          rm -rf cordova-app/www/*
          cp -r dist/* cordova-app/www/
        fi

    - name: Fix Cordova configuration
      run: |
        if [ -f "cordova-app/config.xml" ]; then
          sed -i 's/<platform name="android">/<platform name="android">\n        <preference name="android-minSdkVersion" value="21" \/>\n        <preference name="android-targetSdkVersion" value="34" \/>/g' cordova-app/config.xml
        fi

    - name: Build APK
      run: |
        cd cordova-app
        cordova build android --release
      continue-on-error: true

    - name: Build APK (Debug if Release fails)
      if: failure()
      run: |
        cd cordova-app
        cordova build android

    - name: Sign APK
      if: success() && github.event_name == 'push'
      run: |
        if [ -f "cordova-app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          keytool -genkey -v -keystore release.keystore -keyalg RSA -keysize 2048 -validity 10000 -alias release -storepass android -keypass android -dname "CN=APNotes, O=APNotes, L=APNotes, S=APNotes, C=US"
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore release.keystore -storepass android cordova-app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk release
          $ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign -v 4 cordova-app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk APNotesOCR-release.apk
        fi

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apk-artifacts
        path: |
          cordova-app/platforms/android/app/build/outputs/apk/**/*.apk
          APNotesOCR-release.apk
        retention-days: 30
        if-no-files-found: ignore

    - name: Create Release
      if: success() && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          APNotesOCR-release.apk
          cordova-app/platforms/android/app/build/outputs/apk/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.AP_NOTES_APK }}
